# ─────────────────────────────────────────────────────
# Render Blueprint — Jumbotail Shipping Estimator
# https://render.com/docs/blueprint-spec
# ─────────────────────────────────────────────────────

databases:
  - name: jumbotail-db
    plan: free
    databaseName: jumbotail_shipping
    user: jumbotail

services:
  - type: web
    name: jumbotail-app
    runtime: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: jumbotail-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
